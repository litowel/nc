<svg 
  viewBox="0 0 100 100" 
  xmlns="http://www.w3.org/2000/svg"
  width="100%"
  height="100%"
>
  <defs>
    <linearGradient id="nexus-grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    <linearGradient id="nexus-grad2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
    <linearGradient id="nexus-grad3" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c084fc" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
    <filter id="nexus-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <radialGradient id="nexus-core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="40%" stop-color="#06b6d4" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#c084fc" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Static Outer Aura -->
  <circle cx="50" cy="50" r="48" stroke="url(#nexus-grad3)" stroke-width="0.5" opacity="0.3" filter="url(#nexus-glow)" fill="none" />

  <!-- Outer Rotating Ring -->
  <g fill="none">
    <circle cx="50" cy="50" r="44" stroke="url(#nexus-grad1)" stroke-width="1.5" stroke-dasharray="3 6" opacity="0.8" />
    <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="24s" repeatCount="indefinite" />
  </g>

  <!-- Inner Counter-Rotating Ring -->
  <g fill="none">
    <circle cx="50" cy="50" r="38" stroke="url(#nexus-grad2)" stroke-width="1" stroke-dasharray="15 5" opacity="0.6" />
    <animateTransform attributeName="transform" type="rotate" from="360 50 50" to="0 50 50" dur="18s" repeatCount="indefinite" />
  </g>

  <!-- Complex Star/Geometry Base -->
  <g filter="url(#nexus-glow)">
    <polygon points="50,12 83,31 83,69 50,88 17,69 17,31" stroke="url(#nexus-grad1)" stroke-width="1.5" fill="none" opacity="0.9" />
    <polygon points="50,18 78,34 78,66 50,82 22,66 22,34" stroke="url(#nexus-grad3)" stroke-width="1" fill="none" opacity="0.7" />
    <polygon points="50,25 78,70 22,70" stroke="url(#nexus-grad2)" stroke-width="0.75" fill="none" opacity="0.6" />
    <polygon points="50,75 78,30 22,30" stroke="url(#nexus-grad2)" stroke-width="0.75" fill="none" opacity="0.6" />
  </g>

  <!-- Energy Beams Connecting Nodes -->
  <g opacity="0.3" fill="none">
    <line x1="50" y1="12" x2="50" y2="88" stroke="url(#nexus-grad1)" stroke-width="0.5" />
    <line x1="17" y1="31" x2="83" y2="69" stroke="url(#nexus-grad1)" stroke-width="0.5" />
    <line x1="17" y1="69" x2="83" y2="31" stroke="url(#nexus-grad1)" stroke-width="0.5" />
  </g>

  <!-- Pulsing Core -->
  <g filter="url(#nexus-glow)">
    <circle cx="50" cy="50" r="14" fill="url(#nexus-core)">
      <animate attributeName="r" values="12;15;12" dur="4s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.8;1;0.8" dur="4s" repeatCount="indefinite" />
    </circle>
    <circle cx="50" cy="50" r="4" fill="#ffffff" />
  </g>
</svg>
